<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視障輔助語音上課系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #111827;
            color: #F3F4F6;
            margin: 0;
            overflow-x: hidden;
        }
        
        #startOverlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(17, 24, 39, 0.95);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #3B82F6;
        }

        video {
            width: 100%;
            display: block;
        }
        
        .status-badge {
            transition: all 0.3s ease;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col" onclick="handleGlobalClick(event)">

    <!-- 金鑰設定對話框 -->
    <div id="apiKeyModal" class="hidden fixed inset-0 bg-black bg-opacity-90 z-[60] flex flex-col items-center justify-center" onclick="event.stopPropagation()">
        <div class="bg-gray-800 p-8 rounded-2xl w-11/12 max-w-md border border-gray-700 shadow-2xl">
            <h3 class="text-2xl font-bold text-blue-400 mb-4">設定 Google API Key</h3>
            <p class="text-gray-300 mb-4 text-sm leading-relaxed">
                為了在 GitHub 上安全運作，請在此貼上您的 Gemini API Key。<br><br>
                <span class="text-green-400 font-bold">安全機制：</span>金鑰只會儲存在您這台裝置的瀏覽器中，不會外流！
            </p>
            <input type="password" id="apiKeyInput" class="w-full bg-gray-900 text-white border border-gray-600 rounded-lg p-3 mb-6 focus:outline-none focus:border-blue-500" placeholder="請貼上新申請的 AIzaSy...">
            <div class="flex space-x-3">
                <button onclick="closeApiModal(event)" class="w-1/3 bg-gray-600 hover:bg-gray-500 transition-colors text-white font-bold py-3 px-4 rounded-lg">取消</button>
                <button onclick="saveApiKey(event)" class="w-2/3 bg-blue-600 hover:bg-blue-700 transition-colors text-white font-bold py-3 px-4 rounded-lg">儲存</button>
            </div>
        </div>
    </div>

    <!-- 啟動覆蓋層 -->
    <div id="startOverlay" onclick="initSystem(event)">
        <div class="w-32 h-32 bg-blue-500 rounded-full flex items-center justify-center pulse-animation mb-6">
            <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
            </svg>
        </div>
        <h1 class="text-4xl font-bold text-center px-4 leading-tight">點擊螢幕任意處<br>啟動語音輔助系統</h1>
    </div>

    <header class="bg-gray-800 p-6 shadow-md text-center relative">
        <h1 class="text-3xl font-bold text-blue-400">課堂語音輔助系統</h1>
        <p class="text-gray-400 mt-2 text-lg">目前模式：<span id="currentModeText" class="text-white font-bold bg-blue-600 px-3 py-1 rounded-full status-badge">文字讀取</span></p>
        
        <!-- 手動開啟設定的按鈕 -->
        <button onclick="showApiModal(event)" class="absolute top-6 right-6 bg-gray-700 hover:bg-gray-600 text-white p-2 rounded-full shadow-lg transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </button>
    </header>

    <main class="flex-grow p-6 flex flex-col items-center justify-start space-y-6">
        <div id="video-container" class="shadow-2xl">
            <video id="video" autoplay playsinline muted></video>
            <div id="scanningLine" class="absolute top-0 left-0 w-full h-1 bg-blue-400 shadow-[0_0_15px_#3B82F6] hidden"></div>
        </div>
        <canvas id="canvas" class="hidden"></canvas>

        <div class="w-full max-w-2xl bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700">
            <h2 class="text-xl font-bold text-gray-300 mb-3 border-b border-gray-600 pb-2">系統狀態紀錄</h2>
            <div id="logArea" class="h-48 overflow-y-auto text-lg space-y-2 font-mono">
                <p class="text-gray-500">系統尚未啟動...</p>
            </div>
        </div>

        <div class="text-center text-gray-400 text-sm max-w-xl">
            <p>【操作提示】說出「切換文字」、「切換圖片」或「切換動作」更改模式。說出「掃描」或點擊畫面進行分析。</p>
        </div>
    </main>

    <script>
        // --- 安全金鑰處理機制 ---
        const apiKey = "AIzaSyCyZSyLwqlKsvwdy9knofm50pfRtjYzSC4"; 
        
        function getActiveKey() {
            return localStorage.getItem('geminiApiKey') || apiKey;
        }

        // --- 模式定義 ---
        const MODES = {
            TEXT: {
                id: 'TEXT',
                name: '文字讀取',
                prompt: `請擷取圖片中黑板、白板或投影幕上的所有文字內容。請直接輸出文字本身，唸出排版結構，不要加任何開場白。`
            },
            IMAGE: {
                id: 'IMAGE',
                name: '畫面描述',
                prompt: `這是一張上課的畫面。請為視障學生詳細描述畫面的整體內容，包含黑板上的圖表結構、物體配置等。請用語氣溫和的語音導覽方式描述。`
            },
            ACTION_EMOTION: {
                id: 'ACTION_EMOTION',
                name: '動作與情緒',
                prompt: `請分析這張圖片中老師（或主要人物）的肢體動作、臉部表情與情緒。請用一句或兩句生動、簡短的口語直接輸出描述，讓視障生能立刻感受到課堂的動態氛圍。`
            }
        };

        let currentMode = MODES.TEXT;
        let isSystemActive = false;
        let isProcessing = false;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const logArea = document.getElementById('logArea');
        const modeText = document.getElementById('currentModeText');
        const scanningLine = document.getElementById('scanningLine');

        // --- 語音辨識設定 (STT) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = false;
            recognition.lang = 'zh-TW';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.trim();
                log(`聽到指令: "${transcript}"`);
                processVoiceCommand(transcript);
            };

            recognition.onend = () => {
                if (isSystemActive && !isProcessing) {
                    try { recognition.start(); } catch(e){}
                }
            };
        }

        function showApiModal(event) {
            if (event) event.stopPropagation();
            const currentKey = localStorage.getItem('geminiApiKey') || "";
            document.getElementById('apiKeyInput').value = currentKey;
            document.getElementById('apiKeyModal').classList.remove('hidden');
        }

        function closeApiModal(event) {
            if (event) event.stopPropagation();
            document.getElementById('apiKeyModal').classList.add('hidden');
        }

        function saveApiKey(event) {
            if (event) event.stopPropagation();
            const input = document.getElementById('apiKeyInput').value.trim();
            if (input) {
                localStorage.setItem('geminiApiKey', input);
                closeApiModal();
                log("API Key 已安全儲存至瀏覽器", "text-green-400");
                speak("金鑰儲存成功");
            } else {
                alert("金鑰不能為空！");
            }
        }

        async function initSystem(event) {
            if (event) event.stopPropagation(); 
            
            document.getElementById('startOverlay').style.display = 'none';
            isSystemActive = true;

            log("系統啟動中，正在存取攝影機...", "text-blue-400");
            await startCamera();
            
            if (recognition) {
                try { recognition.start(); } catch(e){}
            }

            if (!getActiveKey()) {
                log("請點擊右上角設定您的 API Key 以啟用分析功能", "text-yellow-400");
                speak("系統已啟動。但您尚未設定 API Key，請點擊右上角按鈕進行設定。");
                setTimeout(showApiModal, 3000);
            } else {
                speak("系統已啟動。您可以隨時說出切換文字、切換畫面，或是切換動作。點擊螢幕任何一處即可開始分析。");
            }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                log("攝影機啟動成功。", "text-green-400");
            } catch (err) {
                log(`攝影機啟動失敗: ${err.message}`, "text-red-500");
                speak("無法存取攝影機，請檢查權限設定。");
            }
        }

        function processVoiceCommand(transcript) {
            if (isProcessing) return;
            if (transcript.includes('文字')) setMode(MODES.TEXT);
            else if (transcript.includes('圖片') || transcript.includes('畫面')) setMode(MODES.IMAGE);
            else if (transcript.includes('動作') || transcript.includes('情緒') || transcript.includes('老師')) setMode(MODES.ACTION_EMOTION);
            else if (transcript.includes('掃描') || transcript.includes('執行') || transcript.includes('分析') || transcript.includes('看')) executeAnalysis();
        }

        function setMode(newMode) {
            if (currentMode.id === newMode.id) return;
            currentMode = newMode;
            modeText.innerText = currentMode.name;
            modeText.className = "text-white font-bold px-3 py-1 rounded-full status-badge bg-green-600";
            setTimeout(() => { modeText.className = "text-white font-bold px-3 py-1 rounded-full status-badge bg-blue-600"; }, 1000);
            
            log(`已切換至【${currentMode.name}】模式`, "text-yellow-400");
            speak(`切換至${currentMode.name}`);
        }

        function handleGlobalClick(event) {
            if (!isSystemActive || isProcessing) return;
            if (event.target.closest('button') || event.target.closest('#apiKeyModal') || event.target.closest('input')) return;
            executeAnalysis();
        }

        // 優化後的網路請求機制：遇到額度問題直接擋下，不浪費時間重試
        async function fetchWithBackoff(url, payload) {
            const delays = [1000, 2000]; // 減少重試次數，加快錯誤反應速度
            let lastError;
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    
                    if (!response.ok || data.error) {
                        const errorMsg = data.error?.message || `狀態碼: ${response.status}`;
                        // 若確認是額度耗盡 (429 或含有 Quota exceeded) 或者是 API 金鑰錯誤 (400)
                        if (errorMsg.includes('Quota exceeded') || response.status === 429) {
                            throw new Error(`API_QUOTA_EXCEEDED`); // 發送特殊錯誤碼
                        }
                        if (errorMsg.includes('not found') || response.status === 404) {
                            throw new Error(`找不到該模型`);
                        }
                        throw new Error(errorMsg);
                    }
                    return data;
                } catch (error) {
                    lastError = error;
                    // 如果是致命錯誤（例如額度沒了），不等待直接拋出，跳出重試迴圈
                    if (error.message === 'API_QUOTA_EXCEEDED' || error.message.includes('找不到')) {
                        throw error;
                    }
                    if (i < delays.length) await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
            throw new Error(`連線失敗 (${lastError.message})`);
        }

        async function executeAnalysis() {
            if (isProcessing) return;
            const currentKey = getActiveKey();
            if (!currentKey) {
                speak("請先設定 API Key");
                showApiModal();
                return;
            }

            isProcessing = true;
            speak(`正在掃描${currentMode.name}，請稍候。`);
            scanningLine.style.display = 'block';
            scanningLine.style.animation = 'scan 1.5s linear infinite';
            
            setTimeout(async () => {
                try {
                    if (!video.videoWidth) throw new Error("攝影機尚未準備好");

                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                    // 將最穩定的 1.5-flash 放回首位，並加入輕量化 8b 模型
                    const modelsToTry = ["gemini-1.5-flash", "gemini-1.5-flash-8b", "gemini-2.0-flash", "gemini-1.5-pro"];
                    let resultText = "";
                    let success = false;
                    let lastErrorMessage = "";

                    for (const modelName of modelsToTry) {
                        try {
                            log(`發送至 AI 分析中 (使用模型: ${modelName})...`, "text-blue-300");
                            resultText = await callGeminiAPI(base64Image, currentMode.prompt, currentKey, modelName);
                            success = true;
                            break; 
                        } catch (error) {
                            // 判斷是否為額度耗盡
                            if (error.message === 'API_QUOTA_EXCEEDED') {
                                log(`❌ 錯誤：API 金鑰免費額度為 0 或已耗盡。`, "text-red-500");
                                log(`請至 Google AI Studio 綁定付款資訊或檢查專案狀態。`, "text-red-400");
                                lastErrorMessage = "API 免費額度已用盡，請檢查帳號狀態。";
                                break; // 額度沒了，換模型也沒用，直接終止迴圈
                            }
                            
                            lastErrorMessage = error.message;
                            log(`模型 ${modelName} 失敗: ${error.message}`, "text-yellow-500");
                            log(`準備嘗試備用模型...`, "text-gray-400");
                        }
                    }

                    if (success) {
                        log(`AI 回應: ${resultText}`, "text-white");
                        speak(resultText); 
                    } else {
                        throw new Error(lastErrorMessage);
                    }

                } catch (error) {
                    log(`分析徹底失敗: ${error.message}`, "text-red-500");
                    speak(`抱歉，發生錯誤：${error.message}`);
                } finally {
                    isProcessing = false;
                    scanningLine.style.display = 'none';
                }
            }, 1500); 
        }

        async function callGeminiAPI(base64Image, promptText, key, modelName) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`;
            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ]
                }],
                generationConfig: { temperature: 0.4 }
            };

            const data = await fetchWithBackoff(url, payload);

            if (data.promptFeedback && data.promptFeedback.blockReason) throw new Error("被系統安全機制阻擋");
            if (data.candidates && data.candidates[0].finishReason === 'SAFETY') throw new Error("包含敏感內容被阻擋");
            if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                return data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("無法解析回傳格式");
            }
        }

        window.speechUtterances = []; 
        function speak(text) {
            if (!window.speechSynthesis) return;
            const cleanText = text.replace(/[*#_`~]/g, '');

            if (recognition) { try { recognition.stop(); } catch(e){} }
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();
            const twVoice = voices.find(v => v.lang.includes('zh-TW'));
            if (twVoice) utterance.voice = twVoice;
            
            utterance.lang = 'zh-TW';
            utterance.rate = 1.15; 
            
            window.speechUtterances.push(utterance);
            utterance.onend = () => {
                const index = window.speechUtterances.indexOf(utterance);
                if (index > -1) window.speechUtterances.splice(index, 1);
                if (isSystemActive && recognition && !isProcessing) { try { recognition.start(); } catch(e){} }
            };

            setTimeout(() => { window.speechSynthesis.speak(utterance); }, 100);
        }

        function log(message, colorClass = "text-gray-300") {
            const time = new Date().toLocaleTimeString('zh-TW', {hour12: false});
            const p = document.createElement('p');
            p.className = colorClass;
            p.innerText = `[${time}] ${message}`;
            logArea.prepend(p);
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
