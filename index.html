<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視障輔助語音上課系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #111827;
            color: #F3F4F6;
            margin: 0;
            overflow-x: hidden;
        }
        
        #startOverlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(17, 24, 39, 0.95);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        #video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #3B82F6;
        }

        video {
            width: 100%;
            display: block;
        }
        
        .status-badge {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col" onclick="handleGlobalClick()">

    <div id="startOverlay" onclick="initSystem(event)">
        <div class="w-32 h-32 bg-blue-500 rounded-full flex items-center justify-center pulse-animation mb-6">
            <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
            </svg>
        </div>
        <h1 class="text-4xl font-bold text-center px-4 leading-tight">點擊螢幕任意處<br>啟動語音輔助系統</h1>
    </div>

    <header class="bg-gray-800 p-6 shadow-md text-center">
        <h1 class="text-3xl font-bold text-blue-400">課堂語音輔助系統</h1>
        <p class="text-gray-400 mt-2 text-lg">目前模式：<span id="currentModeText" class="text-white font-bold bg-blue-600 px-3 py-1 rounded-full status-badge">文字讀取</span></p>
    </header>

    <main class="flex-grow p-6 flex flex-col items-center justify-start space-y-6">
        
        <div id="video-container" class="shadow-2xl">
            <video id="video" autoplay playsinline muted></video>
            <div id="scanningLine" class="absolute top-0 left-0 w-full h-1 bg-blue-400 shadow-[0_0_15px_#3B82F6] hidden"></div>
        </div>
        <canvas id="canvas" class="hidden"></canvas>

        <div class="w-full max-w-2xl bg-gray-800 rounded-xl p-6 shadow-lg border border-gray-700">
            <h2 class="text-xl font-bold text-gray-300 mb-3 border-b border-gray-600 pb-2">系統狀態紀錄</h2>
            <div id="logArea" class="h-48 overflow-y-auto text-lg space-y-2 font-mono">
                <p class="text-gray-500">系統尚未啟動...</p>
            </div>
        </div>

        <div class="text-center text-gray-400 text-sm max-w-xl">
            <p>【操作提示】隨時說出「切換文字」、「切換圖片」或「切換動作」來更改模式。說出「掃描」或「點擊畫面」即可進行分析。</p>
        </div>

    </main>

    <script>
        // --- 系統設定與金鑰 ---
        // 您的 API Key
        const apiKey = "AIzaSyBo_Q3R47F9MICB2yUO6hQjeviO9eglCE4"; 
        
        // --- 模式定義與智慧 Prompt ---
        const MODES = {
            TEXT: {
                id: 'TEXT',
                name: '文字讀取',
                prompt: `請擷取圖片中黑板、白板或投影幕上的所有文字內容。請直接輸出文字本身，唸出排版結構，不要加任何開場白或解釋。`
            },
            IMAGE: {
                id: 'IMAGE',
                name: '畫面描述',
                prompt: `這是一張上課的畫面。請為視障學生詳細描述畫面的整體內容，包含黑板上的圖表結構、物體配置等。請用語氣溫和的語音導覽方式描述，字數精簡。`
            },
            ACTION_EMOTION: {
                id: 'ACTION_EMOTION',
                name: '動作與情緒',
                prompt: `你是一個專為視障學生設計的課堂輔助系統。請分析這張圖片中老師（或主要人物）的肢體動作、臉部表情與情緒。
                         【重要指示】：請智慧地將「老師的動作/情緒」與「黑板或目前的教學內容」結合起來描述。
                         請用一句或兩句生動、簡短的口語直接輸出描述，讓視障生能立刻感受到課堂的動態氛圍與教學情境。`
            }
        };

        let currentMode = MODES.TEXT;
        let isSystemActive = false;
        let isProcessing = false;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const logArea = document.getElementById('logArea');
        const modeText = document.getElementById('currentModeText');
        const scanningLine = document.getElementById('scanningLine');

        // --- 語音辨識設定 (STT) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = false;
            recognition.lang = 'zh-TW';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.trim();
                log(`聽到指令: "${transcript}"`);
                processVoiceCommand(transcript);
            };

            recognition.onerror = (event) => {
                // 忽略沒聽到聲音的報錯，避免洗畫面
            };

            recognition.onend = () => {
                if (isSystemActive && !isProcessing) {
                    try { recognition.start(); } catch(e){}
                }
            };
        }

        // --- 初始化系統 ---
        async function initSystem(event) {
            if (event) event.stopPropagation(); 
            document.getElementById('startOverlay').style.display = 'none';
            isSystemActive = true;

            log("系統啟動中，正在存取攝影機...", "text-blue-400");
            await startCamera();
            
            if (recognition) {
                try { recognition.start(); } catch(e){}
            }

            // 確保語音能正確初始化並發聲
            setTimeout(() => {
                speak("系統已啟動。您可以隨時說出：切換文字、切換畫面，或是切換動作。點擊螢幕任何一處，或說出『掃描』，即可開始分析。");
            }, 500);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                log("攝影機啟動成功。", "text-green-400");
            } catch (err) {
                log(`攝影機啟動失敗: ${err.message}`, "text-red-500");
                speak("無法存取攝影機，請檢查權限設定。");
            }
        }

        function processVoiceCommand(transcript) {
            if (isProcessing) return;

            if (transcript.includes('文字')) {
                setMode(MODES.TEXT);
            } else if (transcript.includes('圖片') || transcript.includes('畫面')) {
                setMode(MODES.IMAGE);
            } else if (transcript.includes('動作') || transcript.includes('情緒') || transcript.includes('老師')) {
                setMode(MODES.ACTION_EMOTION);
            } 
            else if (transcript.includes('掃描') || transcript.includes('執行') || transcript.includes('分析') || transcript.includes('看')) {
                executeAnalysis();
            }
        }

        function setMode(newMode) {
            if (currentMode.id === newMode.id) return;
            currentMode = newMode;
            modeText.innerText = currentMode.name;
            modeText.className = "text-white font-bold px-3 py-1 rounded-full status-badge bg-green-600";
            setTimeout(() => {
                modeText.className = "text-white font-bold px-3 py-1 rounded-full status-badge bg-blue-600";
            }, 1000);
            
            log(`已切換至【${currentMode.name}】模式`, "text-yellow-400");
            speak(`已切換至${currentMode.name}模式`);
        }

        function handleGlobalClick() {
            if (!isSystemActive) return;
            if (isProcessing) return;
            
            log("偵測到點擊，開始擷取畫面...");
            executeAnalysis();
        }

        // --- 執行擷取與分析 ---
        async function executeAnalysis() {
            if (isProcessing) return;
            isProcessing = true;
            
            speak(`正在為您掃描${currentMode.name}，請稍候。`);
            
            scanningLine.style.display = 'block';
            scanningLine.style.animation = 'scan 1.5s linear infinite';
            
            // 延遲執行確保 "請稍候" 的語音有時間開始唸
            setTimeout(async () => {
                try {
                    if (!video.videoWidth || !video.videoHeight) {
                        throw new Error("攝影機畫面尚未準備好，請稍後再試。");
                    }

                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                    log("發送至 AI 分析中...", "text-blue-300");

                    const resultText = await callGeminiAPI(base64Image, currentMode.prompt);
                    
                    log(`AI 回應: ${resultText}`, "text-white");
                    speak(resultText); // 播放最終結果

                } catch (error) {
                    log(`分析失敗: ${error.message}`, "text-red-500");
                    speak(`抱歉，發生錯誤：${error.message}`);
                } finally {
                    isProcessing = false;
                    scanningLine.style.display = 'none';
                }
            }, 1500); 
        }

        // --- 呼叫 Gemini API ---
        async function callGeminiAPI(base64Image, promptText) {
            // ★★★ 修正點：使用正式版 gemini-1.5-flash 模型 ★★★
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: promptText },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ]
                }],
                generationConfig: {
                    temperature: 0.4
                },
                safetySettings: [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                ]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.error) {
                throw new Error(data.error.message || "未知的 API 錯誤");
            }
            if (data.promptFeedback && data.promptFeedback.blockReason) {
                throw new Error("畫面內容被系統安全機制阻擋");
            }
            if (data.candidates && data.candidates[0].finishReason === 'SAFETY') {
                throw new Error("分析中包含敏感內容，已被安全機制阻擋");
            }
            if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                return data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("無法解析 AI 回傳格式");
            }
        }

        // --- 強化版語音合成輸出 (TTS) ---
        window.speechUtterances = []; 

        function speak(text) {
            if (!window.speechSynthesis) {
                log("瀏覽器不支援語音合成", "text-red-500");
                return;
            }

            const cleanText = text.replace(/[*#_`~]/g, '');

            if (recognition) {
                try { recognition.stop(); } catch(e){}
            }

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            const voices = window.speechSynthesis.getVoices();
            const twVoice = voices.find(v => v.lang === 'zh-TW' || v.lang.includes('zh-TW'));
            if (twVoice) utterance.voice = twVoice;

            utterance.lang = 'zh-TW';
            utterance.rate = 1.15; 
            utterance.pitch = 1.0;

            window.speechUtterances.push(utterance);

            utterance.onend = () => {
                const index = window.speechUtterances.indexOf(utterance);
                if (index > -1) window.speechUtterances.splice(index, 1);

                if (isSystemActive && recognition && !isProcessing) {
                    try { recognition.start(); } catch(e){}
                }
            };

            utterance.onerror = (e) => {
                console.error("語音播放錯誤:", e);
            };

            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 100);
        }

        function log(message, colorClass = "text-gray-300") {
            const time = new Date().toLocaleTimeString('zh-TW', {hour12: false});
            const p = document.createElement('p');
            p.className = colorClass;
            p.innerText = `[${time}] ${message}`;
            logArea.prepend(p);
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes scan {
                0% { top: 0; opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                100% { top: 100%; opacity: 0; }
            }
        `;
        document.head.appendChild(style);

    </script>
</body>
</html>
